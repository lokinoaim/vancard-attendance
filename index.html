<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width,initial-scale=1.0,viewport-fit=cover">

<title>VANCard Attendance System</title>

<meta
name="theme-color"
content="#0B3D91">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link
href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
rel="stylesheet">

<link
rel="stylesheet"
href="style.css">

<script src="https://unpkg.com/html5-qrcode"></script>

</head>

<body>

<div class="container">

<header>

<h1>VANCard Attendance System</h1>

<p>Junior Philippine Institute of Accountants</p>

<div
id="connectionStatus"
class="offline">

Connecting...

</div>

</header>

<div class="card">

<h2>Select Event</h2>

<select id="eventSelect">

<option>Loading Events...</option>

</select>

<button id="refreshEvents">

Refresh Events

</button>

</div>

<div class="card">

<h2>Scanner</h2>

<div id="reader"></div>

<div class="buttons">

<button
id="startScanner">

Start Scanner

</button>

<button
id="stopScanner">

Stop Scanner

</button>

</div>

<p
id="scannerMessage">

Scanner Ready

</p>

</div>

<div class="card">

<h2>Member Information</h2>

<table>

<tr>

<th>Member ID</th>

<td id="memberId">-</td>

</tr>

<tr>

<th>Name</th>

<td id="memberName">-</td>

</tr>

<tr>

<th>Course</th>

<td id="memberCourse">-</td>

</tr>

<tr>

<th>Year</th>

<td id="memberYear">-</td>

</tr>

<tr>

<th>Status</th>

<td id="attendanceStatus">

Waiting...

</td>

</tr>

</table>

</div>

<div class="card">

<h2>Activity Log</h2>

<div id="activityLog">

System Initialized

</div>

</div>

<footer>

VANCard Attendance System © 2026

</footer>

</div>

<script src="script.js"></script>

</body>

</html>
